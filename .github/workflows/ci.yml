name: CI

on:
  pull_request:
    types:
      - opened

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate publication context
        shell: bash
        run: |
          test "$GITHUB_HEAD_REF" = "pass-4-7"
          test "$(jq -r '.pull_request.head.repo.full_name' "$GITHUB_EVENT_PATH")" = "$GITHUB_REPOSITORY"
      - uses: actions/checkout@v4
        with:
          ref: pass-4-7
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Reconstruct and apply validated implementation
        shell: bash
        run: |
          cat .avlab-patch/part-* | base64 --decode | gzip --decompress > /tmp/pass-4-7.patch
          echo "b0e5f402d1646ae7608781091662606c666baca31b93b04efdb03c2e601872ea  /tmp/pass-4-7.patch" | sha256sum --check
          git apply --check /tmp/pass-4-7.patch
          git apply /tmp/pass-4-7.patch
          rm -rf .avlab-patch
          rm -f .github/workflows/apply-pass-4-7.yml
          cat > .github/workflows/ci.yml <<'ORIGINAL_CI'
          name: CI
          on:
            push:
            pull_request:
          jobs:
            check:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22
                - run: npm install
                - run: npm run check
          ORIGINAL_CI
          git diff --check
      - run: npm install
      - run: npm run check
      - name: Publish implementation branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement AVlab passes 4-7"
          git push origin HEAD:pass-4-7
